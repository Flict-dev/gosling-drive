services:
  backend:
    build: .
    container_name: gosling-drive-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - .:/app

  frontend:
    image: node:20-alpine
    container_name: gosling-drive-frontend
    working_dir: /app
    environment:
      BACKEND_INTERNAL_URL: "http://backend:8000"
    command: sh -c "npm install --no-audit --no-fund && npm run dev"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  postgres:
    image: postgres:16-alpine
    container_name: gosling-drive-postgres
    environment:
      POSTGRES_DB: gosling_drive
      POSTGRES_USER: gosling
      POSTGRES_PASSWORD: gosling
    ports:
      - "5432:5432"
    volumes:
      - postgres16_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gosling -d gosling_drive"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: gosling-drive-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:3000,http://127.0.0.1:3000"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: gosling-drive-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done;
      until mc ls local >/dev/null 2>&1; do sleep 2; done;
      mc mb --ignore-existing local/gosling-drive;
      exit 0;
      "

volumes:
  postgres16_data:
  minio_data:
  frontend_node_modules:

{% extends "base.html" %}

{% block content %}
<section class="topbar">
  <div>
    <p class="eyebrow">Gosling Drive</p>
    <h1>Файловое хранилище</h1>
  </div>
  <button id="logoutButton" class="ghost hidden">Выйти</button>
</section>

<section id="authPanel" class="grid two">
  <form id="loginForm" class="panel">
    <h2>Вход</h2>
    <label>
      Email
      <input name="email" type="email" autocomplete="email" required>
    </label>
    <label>
      Пароль
      <input name="password" type="password" autocomplete="current-password" required>
    </label>
    <button type="submit">Войти</button>
  </form>

  <form id="registerForm" class="panel">
    <h2>Регистрация</h2>
    <label>
      Имя
      <input name="full_name" type="text" autocomplete="name" required>
    </label>
    <label>
      Email
      <input name="email" type="email" autocomplete="email" required>
    </label>
    <label>
      Пароль
      <input name="password" type="password" autocomplete="new-password" minlength="8" required>
    </label>
    <button type="submit">Создать аккаунт</button>
  </form>
</section>

<section id="drivePanel" class="hidden">
  <div class="grid two">
    <form id="uploadForm" class="panel">
      <h2>Загрузка</h2>
      <label>
        Файл
        <input id="fileInput" name="file" type="file" required>
      </label>
      <button type="submit">Загрузить</button>
      <div class="progress">
        <div id="progressBar"></div>
      </div>
      <p id="uploadStatus" class="status"></p>
    </form>

    <form id="folderForm" class="panel">
      <h2>Папка</h2>
      <label>
        Название
        <input name="name" type="text" required>
      </label>
      <button type="submit">Создать</button>
    </form>
  </div>

  <section class="panel">
    <div class="panelHead">
      <h2>Файлы</h2>
      <button id="refreshButton" class="ghost">Обновить</button>
    </div>
    <div id="fileList" class="fileList"></div>
  </section>
</section>

<div id="toast" class="toast hidden"></div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', path='/js/app.js') }}"></script>
{% endblock %}
